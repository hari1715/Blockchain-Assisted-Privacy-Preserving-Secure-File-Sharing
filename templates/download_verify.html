{% extends "layout.html" %}

{% block content %}
<style>
    /* Advanced CSS for Download Verification Page */
    :root {
        --primary: #00d2ff;
        --primary-glow: rgba(0, 210, 255, 0.4);
        --primary-dark: #0099cc;
        --secondary: #7b2cbf;
        --secondary-glow: rgba(123, 44, 191, 0.4);
        --success: #00f5d4;
        --warning: #ffbe0b;
        --danger: #ff006e;
        --bg-glass: rgba(255, 255, 255, 0.03);
        --border-light: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Page Background Effect */
    .verification-page {
        position: relative;
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    /* Animated Background Pattern */
    .verification-page::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: 
            radial-gradient(circle at 30% 50%, rgba(0, 210, 255, 0.1) 0%, transparent 50%),
            repeating-linear-gradient(45deg, rgba(0, 210, 255, 0.02) 0px, rgba(0, 210, 255, 0.02) 2px, transparent 2px, transparent 10px);
        animation: backgroundShift 20s linear infinite;
        z-index: 0;
    }

    @keyframes backgroundShift {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(1deg) scale(1.02); }
        100% { transform: rotate(0deg) scale(1); }
    }

    /* Main Card Container */
    .verification-card {
        background: rgba(10, 25, 47, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 210, 255, 0.2);
        border-radius: 32px;
        padding: 3rem 2rem;
        position: relative;
        z-index: 1;
        box-shadow: 
            0 20px 40px rgba(0, 0, 0, 0.4),
            0 0 0 1px rgba(0, 210, 255, 0.2),
            inset 0 0 20px rgba(0, 210, 255, 0.1);
        animation: cardAppear 0.6s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes cardAppear {
        0% {
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    /* Glowing Border Effect */
    .verification-card::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, 
            var(--primary), 
            var(--secondary), 
            var(--primary), 
            var(--secondary));
        background-size: 300% 300%;
        border-radius: 34px;
        opacity: 0;
        z-index: -2;
        animation: borderGlow 4s ease infinite;
        transition: opacity 0.3s ease;
    }

    .verification-card:hover::before {
        opacity: 0.3;
    }

    @keyframes borderGlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    /* Security Shield Icon */
    .security-shield {
        width: 100px;
        height: 100px;
        margin: 0 auto 1.5rem;
        background: linear-gradient(135deg, rgba(0, 210, 255, 0.1), rgba(123, 44, 191, 0.1));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        animation: shieldPulse 2s ease infinite;
    }

    .security-shield i {
        font-size: 3.5rem;
        color: var(--warning);
        filter: drop-shadow(0 0 20px var(--warning));
        animation: shieldGlow 2s ease infinite;
    }

    @keyframes shieldPulse {
        0%, 100% {
            box-shadow: 0 0 20px rgba(255, 190, 11, 0.3);
            transform: scale(1);
        }
        50% {
            box-shadow: 0 0 40px rgba(255, 190, 11, 0.6);
            transform: scale(1.05);
        }
    }

    @keyframes shieldGlow {
        0%, 100% {
            filter: drop-shadow(0 0 20px rgba(255, 190, 11, 0.5));
        }
        50% {
            filter: drop-shadow(0 0 40px rgba(255, 190, 11, 0.8));
        }
    }

    /* Title Styles */
    .verification-title {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1rem;
        background: linear-gradient(135deg, #fff, var(--primary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative;
        display: inline-block;
    }

    .verification-title::after {
        content: '';
        position: absolute;
        bottom: -5px;
        left: 25%;
        width: 50%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--primary), transparent);
        animation: lineGlow 3s linear infinite;
    }

    @keyframes lineGlow {
        0% { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
    }

    /* Target File Display */
    .target-file {
        background: rgba(0, 210, 255, 0.05);
        border: 1px solid rgba(0, 210, 255, 0.2);
        border-radius: 12px;
        padding: 0.75rem 1.5rem;
        margin: 1rem 0;
        display: inline-block;
        font-weight: 600;
        color: var(--primary);
        position: relative;
        overflow: hidden;
    }

    .target-file::before {
        content: '';
        position: absolute;
        top: -2px;
        left: -2px;
        right: -2px;
        bottom: -2px;
        background: linear-gradient(45deg, var(--primary), transparent, var(--secondary));
        border-radius: 14px;
        opacity: 0.3;
        animation: fileGlow 3s linear infinite;
    }

    @keyframes fileGlow {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* OTP Input Field */
    .otp-input {
        background: rgba(255, 255, 255, 0.03) !important;
        border: 2px solid rgba(0, 210, 255, 0.3) !important;
        border-radius: 16px !important;
        color: white !important;
        font-size: 2rem !important;
        font-weight: 700 !important;
        letter-spacing: 8px !important;
        text-align: center;
        padding: 1rem !important;
        transition: all 0.3s ease;
        box-shadow: 0 0 20px rgba(0, 210, 255, 0.1);
    }

    .otp-input:focus {
        border-color: var(--primary) !important;
        box-shadow: 
            0 0 0 4px rgba(0, 210, 255, 0.1),
            0 0 30px rgba(0, 210, 255, 0.3) !important;
        outline: none;
        background: rgba(255, 255, 255, 0.05) !important;
        transform: scale(1.02);
    }

    .otp-input::placeholder {
        color: rgba(255, 255, 255, 0.2);
        font-size: 1rem;
        letter-spacing: normal;
    }

    /* Input Glow Effect */
    .input-wrapper {
        position: relative;
        margin-bottom: 2rem;
    }

    .input-wrapper::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 10%;
        width: 80%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--primary), transparent);
        animation: inputLine 2s linear infinite;
    }

    @keyframes inputLine {
        0% { transform: scaleX(0); opacity: 0; }
        50% { transform: scaleX(1); opacity: 1; }
        100% { transform: scaleX(0); opacity: 0; }
    }

    /* Verify Button */
    .verify-btn {
        background: linear-gradient(135deg, var(--success), #00b8a9);
        border: none;
        border-radius: 16px;
        padding: 1rem;
        font-weight: 700;
        font-size: 1.2rem;
        letter-spacing: 1px;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        z-index: 1;
        box-shadow: 0 5px 15px rgba(0, 245, 212, 0.3);
    }

    .verify-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
        transition: left 0.5s ease;
        z-index: -1;
    }

    .verify-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 245, 212, 0.5);
    }

    .verify-btn:hover::before {
        left: 100%;
    }

    .verify-btn:active {
        transform: translateY(0);
    }

    .verify-btn i {
        transition: transform 0.3s ease;
    }

    .verify-btn:hover i {
        transform: scale(1.2);
    }

    /* Cancel Button */
    .cancel-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 16px;
        padding: 0.75rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .cancel-btn::before {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.5s ease, height 0.5s ease;
    }

    .cancel-btn:hover {
        border-color: var(--danger) !important;
        color: var(--danger) !important;
        background: rgba(255, 0, 110, 0.05);
        transform: translateY(-2px);
    }

    .cancel-btn:hover::before {
        width: 300px;
        height: 300px;
    }

    /* Timer/OTP Expiry Indicator */
    .otp-timer {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
    }

    .timer-bar {
        width: 100px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
    }

    .timer-progress {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 100%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        animation: timer 180s linear forwards;
        transform-origin: left;
    }

    @keyframes timer {
        0% { transform: scaleX(1); }
        100% { transform: scaleX(0); }
    }

    /* Security Notice */
    .security-notice {
        margin-top: 1.5rem;
        padding: 0.75rem;
        background: rgba(255, 0, 110, 0.1);
        border: 1px solid rgba(255, 0, 110, 0.2);
        border-radius: 12px;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.6);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        animation: noticePulse 3s ease infinite;
    }

    @keyframes noticePulse {
        0%, 100% { border-color: rgba(255, 0, 110, 0.2); }
        50% { border-color: rgba(255, 0, 110, 0.5); }
    }

    .security-notice i {
        color: var(--danger);
        animation: lockShake 2s ease infinite;
    }

    @keyframes lockShake {
        0%, 100% { transform: rotate(0deg); }
        5% { transform: rotate(10deg); }
        10% { transform: rotate(-10deg); }
        15% { transform: rotate(0deg); }
    }

    /* Loading State for Button */
    .btn-loading {
        position: relative;
        pointer-events: none;
        opacity: 0.8;
    }

    .btn-loading::after {
        content: '';
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: buttonLoading 1s linear infinite;
    }

    @keyframes buttonLoading {
        to { transform: rotate(360deg); }
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .verification-card {
            padding: 2rem 1.5rem;
            margin: 1rem;
        }

        .verification-title {
            font-size: 1.5rem;
        }

        .otp-input {
            font-size: 1.5rem !important;
            letter-spacing: 4px !important;
            padding: 0.75rem !important;
        }

        .security-shield {
            width: 80px;
            height: 80px;
        }

        .security-shield i {
            font-size: 2.5rem;
        }
    }

    /* Dark Mode Optimization */
    @media (prefers-color-scheme: dark) {
        .verification-card {
            background: rgba(5, 15, 30, 0.95);
        }
    }

    /* Print Styles */
    @media print {
        .verification-page::before,
        .security-shield,
        .verify-btn,
        .cancel-btn {
            display: none;
        }
    }
</style>

<div class="verification-page">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="verification-card">
                <div class="security-shield">
                    <i class="fa-solid fa-file-shield"></i>
                </div>
                
                <h3 class="verification-title">Restricted Download</h3>
                
                <div class="text-center mb-4">
                    <p class="text-white-50 mb-2">
                        Security Check required for
                    </p>
                    <div class="target-file">
                        <i class="fa-solid fa-lock me-2"></i>
                        <strong>{{ target }}</strong>
                    </div>
                    <p class="text-white-50 mt-3">
                        <i class="fa-regular fa-envelope me-2"></i>
                        Please enter the OTP sent to your email
                    </p>
                </div>

                <form action="/verify_download" method="POST" id="otpForm">
                    <div class="input-wrapper">
                        <input type="text" 
                               name="otp" 
                               class="form-control otp-input" 
                               placeholder="000000" 
                               maxlength="6" 
                               pattern="[0-9]{6}"
                               inputmode="numeric"
                               autocomplete="one-time-code"
                               required>
                    </div>

                    <!-- OTP Timer -->
                    <div class="otp-timer">
                        <i class="fa-regular fa-clock"></i>
                        <span>OTP expires in</span>
                        <div class="timer-bar">
                            <div class="timer-progress"></div>
                        </div>
                    </div>

                    <!-- Security Notice -->
                    <div class="security-notice">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Never share this OTP with anyone. Our team will never ask for it.</span>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn verify-btn" id="verifyBtn">
                            <i class="fa-solid fa-unlock me-2"></i>
                            Verify & Download
                        </button>
                        <a href="/receiver" class="btn cancel-btn">
                            <i class="fa-solid fa-xmark me-2"></i>
                            Cancel
                        </a>
                    </div>
                </form>

                <!-- Resend Option -->
                <div class="text-center mt-4">
                    <a href="/resend_otp" class="text-white-50 text-decoration-none small">
                        <i class="fa-regular fa-envelope me-1"></i>
                        Didn't receive OTP? Resend
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Auto-submit OTP when 6 digits are entered
    document.querySelector('.otp-input').addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length === 6) {
            document.getElementById('otpForm').submit();
        }
    });

    // Add loading state to button on submit
    document.getElementById('otpForm').addEventListener('submit', function(e) {
        const btn = document.getElementById('verifyBtn');
        btn.classList.add('btn-loading');
        btn.innerHTML = 'Verifying...';
    });

    // Copy OTP from clipboard (if available)
    document.addEventListener('paste', function(e) {
        const pasteData = e.clipboardData.getData('text');
        if (pasteData.match(/^\d{6}$/)) {
            document.querySelector('.otp-input').value = pasteData;
            document.getElementById('otpForm').submit();
        }
    });

    // Timer countdown display (optional enhancement)
    let timeLeft = 180; // 3 minutes in seconds
    const timerDisplay = document.createElement('span');
    document.querySelector('.otp-timer').appendChild(timerDisplay);
    
    const timerInterval = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            timerDisplay.textContent = 'Expired';
            document.querySelector('.otp-input').disabled = true;
            document.querySelector('.verify-btn').disabled = true;
        }
    }, 1000);
</script>
{% endblock %}
