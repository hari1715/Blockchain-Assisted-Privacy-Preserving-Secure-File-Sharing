{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 glass-card">
        <h3 class="text-center mb-4">🔐 2-Factor Verification</h3>
        <p class="text-center text-white-50">Please enter the OTP sent to your email AND verify your face.</p>

        <form action="/verify" method="POST">
            <div class="mb-3">
                <label>Email OTP</label>
                <input type="text" name="otp" class="form-control text-center" placeholder="123456" maxlength="6" required>
            </div>

            <div class="mb-3 text-center">
                <label class="mb-2 text-warning">Face Identity Check</label>
                <div class="d-flex justify-content-center">
                    <video id="video" width="240" height="180" autoplay style="border: 2px solid white; border-radius: 10px;"></video>
                </div>
                <canvas id="canvas" width="240" height="180" style="display:none;"></canvas>
                <input type="hidden" name="image" id="image_data">
            </div>
            
            <button type="button" class="btn btn-warning btn-sm w-100 mb-3" onclick="captureVerify()">
                📸 Capture Face
            </button>
            <p id="status" class="text-center small fw-bold text-success"></p>

            <button type="submit" class="btn btn-custom w-100" id="verifyBtn" disabled>Verify & Login</button>
        </form>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const input = document.getElementById('image_data');
    const btn = document.getElementById('verifyBtn');
    const status = document.getElementById('status');

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; });

    function captureVerify() {
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, 240, 180);
        input.value = canvas.toDataURL('image/jpeg');
        status.innerText = "Face Captured. Ready to Submit.";
        btn.disabled = false;
    }
</script>
{% endblock %}
